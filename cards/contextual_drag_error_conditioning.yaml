# Contextual Drag §3 — error conditioning degrades follow-up accuracy.
#
# Runs the full clean → aggregate → conditioned → analysis chain on
# the host's GPU. The "conditioned" round prompts the model with one
# (1f) or two (2f) of its own previously-failed trajectories and asks
# it to re-attempt the problem; the metric is the per-problem delta
# between the *direct* baseline and the *conditioned* follow-up,
# restricted to samples whose embedded verification verdict is
# parseable (the verdict filter).
#
# Default cell: Qwen3_8B_NoThinking × aime24 × regime=2f, target
# Δ≈+0.22 per AGENTIC_RESEARCH_LOG/GENERAL_EXP_LOG.md 2026-05-04.

title: "Contextual Drag §3 — error conditioning degrades follow-up accuracy"

description: |
  Tests whether prompting the model with its own failed reasoning
  trajectories — and explicitly asking it to re-attempt the problem —
  produces a lower-accuracy answer than asking the same model to
  attempt the problem from scratch (the "direct" baseline). The
  difference is restricted to (problem, conditioning) samples whose
  embedded verification verdict is parseable, so the metric is
  apples-to-apples within the verdict-filtered cohort.

  Subprocess chain (per cell, single GPU):
    inference run    (direct, clean prompt)
      → eval math --flatten_dataset
      → data initial-sampling-postprocess
      → data aggregate -T 0 -F {1 if regime==1f else 2}
      → inference run (conditioned, regime-specific template)
      → eval math (default --response_column init_response_generations)
      → contextual_drag analysis error_conditioning run
            --setting <regime> --cond_jsonl ... --direct_jsonl ...
            --out summary.json
      → load summary; delta_acc = acc_direct − acc_conditioned

  Replicates §3 of "Contextual Drag" (Cheng et al., 2026) on a small
  slice runnable on a single 24 GB GPU.

version: 0.1

organizations:
  - Kitware

submitter:
  name: Contextual Drag refactor team
  email: jon.crall@kitware.com

tags:
  - contextual-drag
  - error-conditioning
  - reasoning

claim:
  python: |
    if aggregate_failed:
      raise Exception(
          "Inconclusive: data aggregate produced 0 problems — increase "
          "--n or pick a benchmark in the model's ambiguous zone "
          "(aime24 works for Qwen3_8B; math500 too easy, gpqa too noisy)."
      )
    if filter_dropped_all:
      raise Exception(
          "Inconclusive: the verdict filter dropped every conditioned "
          "response. Increase --n or relax the verdict requirement."
      )
    if delta_acc is None:
      raise Exception(
          "Inconclusive: delta_acc is null (no overlap between direct "
          "and conditioned cohorts)."
      )
    assert delta_acc >= delta_threshold, (
        f"Got delta_acc={delta_acc:+.3f}, expected >= {delta_threshold:+.3f} "
        f"(acc_direct={acc_direct:.3f}, acc_conditioned={acc_conditioned:.3f}, "
        f"n_kept_problems={n_kept_problems}, regime={regime})."
    )

pipeline:
  error_conditioning:
    executable: 'python -m cards.nodes.run_error_conditioning'
    algo_params:
      model_config: 'Qwen3_8B_NoThinking'
      data_path: 'data/smoke/aime24/aime24.ds'
      regime: '2f'
      init_template_path: 'prompt_templates/init_response_prompt_templates.json'
      init_template_key: 'qwen_math_prompt'
      cond_template_path_1f: 'prompt_templates/1f_templates.json'
      cond_template_key_1f: '1f'
      cond_template_path_2f: 'prompt_templates/2f_templates.json'
      cond_template_key_2f: '2f'
      max_questions: 16
      n: 8
      max_tokens: 8192
      gpu_memory_utilization: 0.85
    out_paths:
      results_fpath: 'results.json'

symbols:
  delta_threshold:
    type: float
    value: 0.05
