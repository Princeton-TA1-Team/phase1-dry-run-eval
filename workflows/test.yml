name: tests

on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      # Intentionally NOT installing the `[inference]` extra: that pulls
      # vllm + CUDA wheels which (a) don't fit on a ubuntu-latest runner
      # and (b) shouldn't be required for the CPU test suite. The conftest
      # stub satisfies any `import vllm` that test collection triggers.
      - run: pip install -e .[dev,eval,analysis,magnet]
      - run: pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check src/contextual_drag/ cards/
