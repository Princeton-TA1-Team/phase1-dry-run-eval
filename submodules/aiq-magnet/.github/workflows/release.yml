name: PurePyRelease

on:
  push:
  workflow_dispatch:

jobs:
  build_sdist:
    ##
    # Build the sdist artifact used by the release workflow.
    # This workflow intentionally builds artifacts but does not run the
    # full test matrix.
    ##
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v6.0.2
    - name: Set up Python 3.13
      uses: actions/setup-python@v5.6.0
      with:
        python-version: '3.13'
    - name: Build sdist
      shell: bash
      run: |-
        python -m pip install pip uv -U
        python -m uv pip install setuptools>=0.8 wheel build twine
        python -m build --sdist --outdir wheelhouse
        python -m twine check ./wheelhouse/aiq_magnet*.tar.gz
    - name: Show built files
      shell: bash
      run: ls -la wheelhouse
    - uses: actions/upload-artifact@v6.0.0
      name: Upload sdist artifact
      with:
        name: sdist_wheels
        path: ./wheelhouse/aiq_magnet*.tar.gz
  build_purepy_wheels:
    ##
    # Build the pure-python wheels used by the release workflow.
    ##
    name: ${{ matrix.python-version }} on ${{ matrix.os }}, arch=${{ matrix.arch }} with ${{ matrix.install-extras }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        python-version:
        - '3.13'
        arch:
        - auto
    steps:
    - name: Checkout source
      uses: actions/checkout@v6.0.2
    - name: Setup Python
      uses: actions/setup-python@v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Build pure wheel
      shell: bash
      run: |-
        python -m pip install pip uv -U
        python -m uv pip install setuptools>=0.8 wheel build twine
        python -m build --wheel --outdir wheelhouse
        python -m twine check ./wheelhouse/aiq_magnet*.whl
    - name: Show built files
      shell: bash
      run: ls -la wheelhouse
    - uses: actions/upload-artifact@v6.0.0
      name: Upload wheels artifact
      with:
        name: wheels-${{ matrix.os }}-${{ matrix.arch }}
        path: ./wheelhouse/aiq_magnet*.whl
  test_deploy:
    name: Deploy Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.event.ref == 'refs/heads/main'
    needs:
    - build_purepy_wheels
    - build_sdist
    steps:
    - name: Checkout source
      uses: actions/checkout@v6.0.2
    - uses: actions/download-artifact@v4.1.8
      name: Download wheels
      with:
        pattern: wheels-*
        merge-multiple: true
        path: wheelhouse
    - uses: actions/download-artifact@v4.1.8
      name: Download sdist
      with:
        name: sdist_wheels
        path: wheelhouse
    - name: Show files to upload
      shell: bash
      run: ls -la wheelhouse
    - name: Prepare publish directory
      shell: bash
      run: |-
        mkdir -p publish_wheelhouse
        shopt -s nullglob
        for FPATH in wheelhouse/*.whl wheelhouse/*.tar.gz wheelhouse/*.zip
        do
            cp "$FPATH" publish_wheelhouse/
        done
        ls -la publish_wheelhouse
    - name: Publish test artifacts to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: publish_wheelhouse
        skip-existing: true
        repository-url: https://test.pypi.org/legacy/
    - uses: actions/upload-artifact@v6.0.0
      name: Upload deploy artifacts
      with:
        name: deploy_artifacts
        path: |-
          wheelhouse/*.whl
          wheelhouse/*.zip
          wheelhouse/*.tar.gz
    permissions:
      contents: read
      id-token: write
    environment: testpypi
  live_deploy:
    name: Deploy Live
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/heads/release')
    needs:
    - build_purepy_wheels
    - build_sdist
    steps:
    - name: Checkout source
      uses: actions/checkout@v6.0.2
    - uses: actions/download-artifact@v4.1.8
      name: Download wheels
      with:
        pattern: wheels-*
        merge-multiple: true
        path: wheelhouse
    - uses: actions/download-artifact@v4.1.8
      name: Download sdist
      with:
        name: sdist_wheels
        path: wheelhouse
    - name: Show files to upload
      shell: bash
      run: ls -la wheelhouse
    - name: Prepare publish directory
      shell: bash
      run: |-
        mkdir -p publish_wheelhouse
        shopt -s nullglob
        for FPATH in wheelhouse/*.whl wheelhouse/*.tar.gz wheelhouse/*.zip
        do
            cp "$FPATH" publish_wheelhouse/
        done
        ls -la publish_wheelhouse
    - name: Publish live artifacts to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: publish_wheelhouse
        skip-existing: true
    - uses: actions/upload-artifact@v6.0.0
      name: Upload deploy artifacts
      with:
        name: deploy_artifacts
        path: |-
          wheelhouse/*.whl
          wheelhouse/*.zip
          wheelhouse/*.tar.gz
    permissions:
      contents: read
      id-token: write
    environment: pypi
  release:
    name: Create Github Release
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/heads/release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
    - live_deploy
    steps:
    - name: Checkout source
      uses: actions/checkout@v6.0.2
    - uses: actions/download-artifact@v4.1.8
      name: Download artifacts
      with:
        name: deploy_artifacts
        path: wheelhouse
    - name: Show files to release
      shell: bash
      run: ls -la wheelhouse
    - run: 'echo "Automatic Release Notes. TODO: improve" > ${{ github.workspace }}-CHANGELOG.txt'
    - name: Tag Release Commit
      if: (startsWith(github.event.ref, 'refs/heads/release'))
      run: |-
        export VERSION=$(python -c "import setup; print(setup.VERSION)")
        git tag "v$VERSION"
        git push origin "v$VERSION"
    - uses: softprops/action-gh-release@v1
      name: Create Release
      id: create_release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        body_path: ${{ github.workspace }}-CHANGELOG.txt
        tag_name: ${{ github.ref }}
        name: Release ${{ github.ref }}
        body: Automatic Release
        generate_release_notes: true
        draft: true
        prerelease: false
        files: |-
          wheelhouse/*.whl
          wheelhouse/*.asc
          wheelhouse/*.ots
          wheelhouse/*.zip
          wheelhouse/*.tar.gz


